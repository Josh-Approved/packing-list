<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="appIconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"></rect>
    </clipPath>
  </defs>
  <g clip-path="url(#appIconClip)">
    <!-- Background: aged ochre (the packing-list per-app accent) -->
    <rect x="0" y="0" width="1024" height="1024" fill="#B58D3F"></rect>

    <!-- Suitcase glyph: paper-white, bold strokes, fills ~60% of the canvas.
         Classic luggage profile (wider than tall), arched handle, horizontal
         lid seam, two filled latches centered on the seam. No corner check. -->
    <g stroke="#FAFAF7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Handle (arched bracket above body) -->
      <path d="M 412 440 L 412 350 Q 412 308 454 308 L 570 308 Q 612 308 612 350 L 612 440"
            stroke-width="36"></path>

      <!-- Suitcase body -->
      <rect x="212" y="440" width="600" height="400" rx="44" stroke-width="36"></rect>

      <!-- Center horizontal lid seam -->
      <line x1="212" y1="640" x2="812" y2="640" stroke-width="22"></line>

      <!-- Two filled latches centered on the seam -->
      <rect x="368" y="612" width="88" height="56" rx="10" fill="#FAFAF7" stroke="none"></rect>
      <rect x="568" y="612" width="88" height="56" rx="10" fill="#FAFAF7" stroke="none"></rect>
    </g>
  </g>
</svg>
